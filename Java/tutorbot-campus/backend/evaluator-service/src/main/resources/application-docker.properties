# Docker profile: everything runs inside Docker
spring.datasource.url=jdbc:oracle:thin:@oracledb:1521/XEPDB1
spring.datasource.username=Adolfo
spring.datasource.password=password

# Eureka — no Eureka server in the dev stack
eureka.client.enabled=false

# RabbitMQ — use the container name from docker-compose.dev.yml
spring.rabbitmq.host=tutorbot-rabbitmq
spring.rabbitmq.port=5672

# Ollama — use the container name from docker-compose.dev.yml
ollama.base-url=http://tutorbot-ollama:11434
